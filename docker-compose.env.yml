version: '3.8'

# sftlogapi v2 Docker Compose 配置（环境变量版）
# 使用方法：
# 1. 复制 config.env.example 为 config.env
# 2. 修改 config.env 中的路径配置
# 3. 运行：docker-compose --env-file config.env -f docker-compose.env.yml up -d

services:
  sftlogapi:
    image: ${DOCKER_IMAGE:-sftlogapi:v2}
    container_name: ${CONTAINER_NAME:-sftlogapi-v2}
    restart: unless-stopped
    
    ports:
      - "5001:${PORT:-5000}"
    
    volumes:
      # 日志目录（只读）
      - ${LOG_BASE_DIR:-/root/sft/testlogs}:${CONTAINER_LOG_DIR:-/data/logs}:ro
      
      # 数据库文件
      - ${DB_PATH:-/root/sft-data/index/logs_trace.db}:${CONTAINER_DB_DIR:-/data/index}/logs_trace.db
      
      # 配置文件
      - ./config:/app/config:ro
    
    environment:
      # 数据库路径（容器内）
      - DB_PATH=${CONTAINER_DB_DIR:-/data/index}/logs_trace.db
      
      # 日志目录（容器内）
      - LOG_BASE_DIR=${CONTAINER_LOG_DIR:-/data/logs}
      
      # API 配置
      - API_KEY=${API_KEY:-zhiduoxing-2026-secret-key}
      - ENABLE_AUTH=${ENABLE_AUTH:-false}
      
      # 服务配置
      - PORT=${PORT:-5000}
      - HOST=${HOST:-0.0.0.0}
      - DEBUG=${DEBUG:-false}
      
      # 缓存配置
      - CACHE_TTL=${CACHE_TTL:-3600}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-10000}
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-4.0}'
          memory: ${MEMORY_LIMIT:-2G}
        reservations:
          cpus: '${CPU_RESERVE:-2.0}'
          memory: ${MEMORY_RESERVE:-1G}
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-100m}"
        max-file: "${LOG_MAX_FILE:-3}"
