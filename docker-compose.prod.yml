version: '3.8'

services:
  sftlogapi:
    image: sftlogapi:v2
    container_name: sftlogapi-v2
    restart: unless-stopped
    
    ports:
      - "5001:5000"
    
    volumes:
      # 日志目录（只读）
      - /root/sft/testlogs:/data/logs:ro
      
      # SQLite 数据库（读写，持久化）
      - /root/sft-data/index:/data/index
      
      # 配置文件
      - ./config:/app/config:ro
    
    environment:
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=5000
      - DB_PATH=/data/index/logs_trace.db
      - LOG_BASE_DIR=/data/logs
      - CACHE_TTL=3600
      - CACHE_MAX_SIZE=10000
      - API_KEY=zhiduoxing-2026-secret-key
      - ENABLE_AUTH=true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '2.0'
          memory: 1G
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    
    # 依赖
    depends_on: []  # 无外部依赖，SQLite 内置

  # 可选：Redis 缓存层（如果需要）
  # redis:
  #   image: redis:7-alpine
  #   container_name: sftlogapi-redis
  #   volumes:
  #     - /root/sft-data/redis:/data
