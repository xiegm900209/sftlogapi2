# 将这三个 location 块替换为以下内容（添加 IP 白名单）

# 1. 前端静态文件服务 - 添加 IP 白名单
location /sftlogapi-v2/ {
    # IP 白名单 - 只允许办公室公网出口
    allow 120.196.51.13;
    deny all;
    
    alias /app/tengine/frontend/;
    index index.html;
    try_files $uri $uri/ /sftlogapi-v2/index.html;
}

# 2. API 接口 - 添加 IP 白名单
location /sftlogapi-v2/api/ {
    # IP 白名单 - 只允许办公室公网出口
    allow 120.196.51.13;
    deny all;
    
    proxy_pass http://192.168.109.77:5001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    client_max_body_size 100m;
}

# 3. 健康检查 - 添加 IP 白名单
location = /sftlogapi-v2/api/health {
    # IP 白名单 - 只允许办公室公网出口
    allow 120.196.51.13;
    deny all;
    
    proxy_pass http://192.168.109.77:5001/api/health;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    access_log off;
}
