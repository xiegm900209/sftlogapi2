# sftlogapi v2 高性能日志查询系统配置
# 端口：8091 (HTTP)
# 子路径：/sftlogapi/
# 后端：Docker 容器 Flask API (127.0.0.1:5001)

server {
    listen       8091;
    server_name  172.16.2.164;

    # 根路径重定向
    location = /sftlogapi {
        return 301 /sftlogapi/;
    }

    # 前端静态文件 - Vue 打包应用
    location /sftlogapi/ {
        alias /var/www/sftlogapi-v2/;
        index index.html;
        
        # 所有路径都返回 index.html（支持 SPA 路由）
        try_files $uri $uri/ /sftlogapi/index.html;
        
        # 静态资源缓存
        location ~* ^/sftlogapi/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API 路由 - 转发到 Docker 容器 5001 端口
    location /sftlogapi-v2/api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /sftlogapi/api/ {
        proxy_pass http://127.0.0.1:5001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 查询超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 100m;
    }

    # 健康检查端点
    location = /sftlogapi/api/health {
        proxy_pass http://127.0.0.1:5001/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }
}
