version: '3.8'

services:
  sftlogapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sftlogapi-v2
    ports:
      - "5000:5000"
    volumes:
      # 挂载日志目录
      - /root/sft/testlogs:/data/logs:ro
      # 挂载数据目录 (数据库 + 索引)
      - ./data:/data
    environment:
      - DEBUG=false
      - PORT=5000
      - DB_PATH=/data/index/logs_index.db
      - LOG_BASE_DIR=/data/logs
      - CACHE_TTL=3600
      - CACHE_MAX_SIZE=10000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

